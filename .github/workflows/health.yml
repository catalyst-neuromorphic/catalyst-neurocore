name: Health Check
on:
  schedule:
    - cron: "0 8 * * *"  # Daily 8AM UTC
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check website
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://catalyst-neuromorphic.com)
          echo "Website: HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Website returned HTTP $STATUS"
            exit 1
          fi
